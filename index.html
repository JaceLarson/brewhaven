<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Brewhaven — Pixel Coffee Shop</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1b1620;
      color: #e9e2d4;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    #game {
      width: 100vw;
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    /* Keep the pixels crunchy when the canvas is scaled by the browser. */
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #hint {
      position: fixed;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      opacity: 0.45;
      pointer-events: none;
    }
    /* Shown on small viewports while the device is in portrait orientation. */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #1b1620;
      color: #e9e2d4;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 18px;
      padding: 24px;
      box-sizing: border-box;
    }
    #rotate-overlay .icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: rotate-hint 1.6s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    /* Toggles real browser fullscreen on mobile to reclaim address-bar space. */
    #fullscreen-btn {
      display: none;
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 1001;
      width: 40px;
      height: 40px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.4);
      color: #e9e2d4;
      font-size: 20px;
      line-height: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="hint">A/D or ←/→ to move • click a station (or hold SPACE) to pour • bubble border = which station next • stop in the bright green zone • some drinks need a milk top-up at a second station • don't lose all 3 hearts!</div>
  <div id="rotate-overlay">
    <span class="icon">📱</span>
    Rotate your device to landscape to play
  </div>
  <button id="fullscreen-btn" aria-label="Toggle fullscreen">⛶</button>

  <!-- Mobile-mode detection, loaded first so other scripts can read it. -->
  <script src="src/mobile.js"></script>

  <!-- Phaser engine from CDN. No build step required. -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game source, loaded in dependency order (plain scripts = shared globals). -->
  <script src="src/sound.js"></script>
  <script src="src/save.js"></script>
  <script src="src/pixelArt.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/main.js"></script>

  <!-- Mobile mode: hide desktop hints, lock to landscape, offer fullscreen. -->
  <script>
    if (MOBILE_MODE) {
      // The in-game "HOW TO PLAY" card already covers touch controls, and
      // every bit of vertical space matters on a phone/tablet.
      document.getElementById('hint').style.display = 'none';
    }

    const rotateOverlay = document.getElementById('rotate-overlay');
    function updateOrientation() {
      const blocked = MOBILE_MODE && isPortrait();
      rotateOverlay.style.display = blocked ? 'flex' : 'none';
      if (window.game) {
        if (blocked) window.game.loop.sleep();
        else window.game.loop.wake();
      }
    }
    updateOrientation();
    window.addEventListener('resize', updateOrientation);
    window.addEventListener('orientationchange', updateOrientation);

    // Real browser fullscreen reclaims the address bar / home-indicator strip
    // on mobile. Only offer it where the Fullscreen API is actually usable.
    const fsBtn = document.getElementById('fullscreen-btn');
    const fsEl = document.documentElement;
    const requestFs = fsEl.requestFullscreen || fsEl.webkitRequestFullscreen;
    const exitFs = document.exitFullscreen || document.webkitExitFullscreen;
    const fsElement = () => document.fullscreenElement || document.webkitFullscreenElement;
    if (MOBILE_MODE && requestFs) {
      fsBtn.style.display = 'block';
      fsBtn.addEventListener('click', () => {
        if (fsElement()) exitFs.call(document);
        else requestFs.call(fsEl);
      });
      const onFsChange = () => {
        fsBtn.textContent = fsElement() ? '⤡' : '⛶';
        // The address bar hiding/showing changes the visible height.
        setTimeout(setViewportHeight, 100);
      };
      document.addEventListener('fullscreenchange', onFsChange);
      document.addEventListener('webkitfullscreenchange', onFsChange);
    }
  </script>
</body>
</html>
