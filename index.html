<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Brewhaven — Pixel Coffee Shop</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1b1620;
      color: #e9e2d4;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    #game {
      width: 100vw;
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    /* Fullscreen toggle, shown on small viewports only. */
    #fullscreen-btn {
      display: none;
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 500;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(27, 22, 32, 0.6);
      color: #e9e2d4;
      font-size: 20px;
      line-height: 40px;
      text-align: center;
      padding: 0;
      cursor: pointer;
    }
    /* Keep the pixels crunchy when the canvas is scaled by the browser. */
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #hint {
      position: fixed;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      opacity: 0.45;
      pointer-events: none;
    }
    /* First-time setup wizard: DOM text input overlaid on the canvas. */
    #setup-input {
      position: fixed;
      display: none;
      z-index: 600;
      font-family: monospace;
      font-weight: bold;
      text-align: center;
      background: #fff4d6;
      color: #2a2030;
      border: 3px solid #ffd166;
      border-radius: 8px;
      outline: none;
      box-sizing: border-box;
      padding: 0 8px;
    }
    /* Shown on small viewports while the device is in portrait orientation. */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #1b1620;
      color: #e9e2d4;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 18px;
      padding: 24px;
      box-sizing: border-box;
    }
    #rotate-overlay .icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: rotate-hint 1.6s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <input id="setup-input" type="text" autocomplete="off" spellcheck="false" />
  <button id="fullscreen-btn" title="Toggle fullscreen">⛶</button>
  <div id="hint">A/D or ←/→ to move • click a station (or hold SPACE) to pour • bubble border = which station next • stop in the bright green zone • some drinks need a milk top-up at a second station • don't lose all 3 hearts!</div>
  <div id="rotate-overlay">
    <span class="icon">📱</span>
    Rotate your device to landscape to play
  </div>

  <!-- Mobile-mode detection, loaded first so other scripts can read it. -->
  <script src="src/mobile.js"></script>

  <!-- Phaser engine from CDN. No build step required. -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game source, loaded in dependency order (plain scripts = shared globals). -->
  <script src="src/sound.js"></script>
  <script src="src/save.js"></script>
  <script src="src/pixelArt.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/SetupScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/main.js"></script>

  <!-- Mobile mode: touch wording + landscape lock. -->
  <script>
    if (MOBILE_MODE) {
      document.getElementById('hint').textContent =
        'Tap a station to walk there • tap & hold to pour • release in the bright green zone • '
        + 'some drinks need a milk top-up at a second station • don\'t lose all 3 hearts!';
    }

    // Unlock the Web Audio API on the very first user gesture. Listening
    // directly on the document (rather than through Phaser's input queue,
    // which dispatches on the next frame) ensures this runs synchronously
    // within the trusted gesture, which strict mobile browsers require.
    const unlockAudio = () => SFX.unlock();
    ['pointerdown', 'touchend', 'keydown'].forEach((evt) =>
      document.addEventListener(evt, unlockAudio, { once: true, passive: true })
    );

    // Fullscreen toggle: handy on mobile to hide the browser chrome.
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    if (MOBILE_MODE && document.documentElement.requestFullscreen) {
      fullscreenBtn.style.display = 'block';
      fullscreenBtn.addEventListener('click', () => {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      });
      document.addEventListener('fullscreenchange', () => {
        fullscreenBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
      });
    }

    const rotateOverlay = document.getElementById('rotate-overlay');
    function updateOrientation() {
      const blocked = MOBILE_MODE && isPortrait();
      rotateOverlay.style.display = blocked ? 'flex' : 'none';
      if (window.game) {
        if (blocked) window.game.loop.sleep();
        else window.game.loop.wake();
      }
    }
    updateOrientation();
    window.addEventListener('resize', updateOrientation);
    window.addEventListener('orientationchange', updateOrientation);
  </script>
</body>
</html>
